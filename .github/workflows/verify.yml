name: Exact and manuscript verification

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install pinned Python dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run exhaustive and symbolic tests
        run: python -m pytest -q
      - name: Run the exact certificate
        run: python scripts/verify_exact.py --output tmp/ci-verification.json
      - name: Run the exact 40-vertex certificate
        run: python scripts/verify_40.py --output tmp/ci-verification-40.json
      - name: Run the extended exact certificates
        run: python scripts/verify_extended.py
      - name: Run exact generalization checks and labelled exploratory screen
        run: python scripts/explore_generalizations.py
      - name: Check generated Lean spectral data
        run: |
          python scripts/generate_lean_diagonalization.py --check
          python scripts/generate_lean40_structural.py --check
          python scripts/generate_lean40_diagonalization.py --check
          python scripts/generate_lean38_certificates.py --check
          python scripts/generate_lean38_ldl.py --check
          python scripts/generate_lean39_42.py --verify-only
      - name: Regenerate graph data and compare
        run: |
          python scripts/export_graph_data.py --output-dir tmp/export
          cmp tmp/export/edges.csv results/edges.csv
          cmp tmp/export/adjacency_matrix.csv results/adjacency_matrix.csv
          cmp tmp/export/distance_matrix.csv results/distance_matrix.csv
      - name: Check synchronized release files
        run: |
          python scripts/sync_manuscript_artifacts.py --check
          python scripts/validate_repository.py

  manuscript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-bibtex-extra
      - name: Compile the arXiv source in isolation
        run: |
          build_dir="$(mktemp -d)"
          unzip -q arxiv/wow284_arxiv_source.zip -d "$build_dir"
          cd "$build_dir"
          latexmk -pdf -bibtex -interaction=nonstopmode -halt-on-error -file-line-error main.tex
          test -s main.pdf
          ! grep -E "undefined citations|undefined references|There were undefined" main.log

  lean-38-40:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject proof placeholders and unsafe shortcuts
        run: python scripts/static_lean_audit.py
      - name: Build Lean 4.31 and the committed order-38/order-40 development
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          build: true
          test: false
          lint: false
          use-mathlib-cache: true
      - name: Compile order-38 and order-40 public endpoints
        shell: bash
        run: |
          if ! (cd lean && lake build Wow284Extension) >/tmp/lean-38-40.log 2>&1; then
            tail -n 240 /tmp/lean-38-40.log
            exit 1
          fi
          tail -n 20 /tmp/lean-38-40.log
      - name: Report order-38 and order-40 endpoint axioms
        run: cd lean && lake env lean Wow284ExtensionAudit.lean

  lean-39-42:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install exact generator dependency
        run: python -m pip install -r requirements.txt
      - name: Generate order-39 and order-42 Lean certificates
        run: python scripts/generate_lean39_42.py
      - name: Audit generated source hygiene and import closure
        run: python scripts/static_lean_audit.py
      - name: Install Lean 4.31 and restore the Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          build: true
          test: false
          lint: false
          use-mathlib-cache: true
      - name: Compile order-39 public endpoint
        shell: bash
        run: |
          if ! (cd lean && lake env lean Wow284/Induced39/Counterexample.lean) >/tmp/lean-39.log 2>&1; then
            tail -n 240 /tmp/lean-39.log
            exit 1
          fi
          tail -n 20 /tmp/lean-39.log
      - name: Compile order-42 public endpoint
        shell: bash
        run: |
          if ! (cd lean && lake env lean Wow284/Induced42/Counterexample.lean) >/tmp/lean-42.log 2>&1; then
            tail -n 240 /tmp/lean-42.log
            exit 1
          fi
          tail -n 20 /tmp/lean-42.log
      - name: Report order-39 and order-42 endpoint axioms
        shell: bash
        run: |
          if ! (cd lean && lake env lean Wow284Generated3942Audit.lean) >/tmp/lean-39-42-axioms.log 2>&1; then
            tail -n 240 /tmp/lean-39-42-axioms.log
            exit 1
          fi
          cat /tmp/lean-39-42-axioms.log
